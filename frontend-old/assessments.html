  <link href="/css/sb-admin-2.min.css" rel="stylesheet">
</head>
<body id="page-top">
  <div id="wrapper">
    <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
      <a class="sidebar-brand d-flex align-items-center justify-content-center" href="/menu.html"><span class="sidebar-brand-text mx-3">Marlowe</span></a>
      <hr class="sidebar-divider">
      <li class="nav-item"><a class="nav-link" href="/menu.html"><i class="fas fa-home"></i> Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/ai-knowledge-base.html"><i class="fas fa-database"></i> AI Knowledge Base</a></li>
      <li class="nav-item"><a class="nav-link" href="/assessments.html"><i class="fas fa-clipboard-check"></i> Assessments</a></li>
      <li class="nav-item"><a class="nav-link" href="/knowledge-graph.html"><i class="fas fa-project-diagram"></i> Knowledge Graph</a></li>
      <li class="nav-item"><a class="nav-link" href="/reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
      <li class="nav-item"><a class="nav-link" href="/chat.html"><i class="fas fa-comments"></i> Chat</a></li>
      <li class="nav-item"><a class="nav-link" href="/faq.html"><i class="fas fa-question-circle"></i> FAQ</a></li>

      <hr class="sidebar-divider">
      <li class="nav-item"><a class="nav-link" href="/login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
    </ul>
    <div id="content-wrapper" class="d-flex flex-column">
      <div id="content">
        <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top"><h1 class="h3 mb-0 text-gray-800">Assessments</h1></nav>
        <div class="container-fluid">
          <div class="card shadow mb-4">
            <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Assessments list</h6></div>
            <div class="card-body">
              <p class="text-muted small mb-3">Assessments are linked to frameworks and optionally organizations. Create them via the API (<code>POST /api/v1/assessments</code>).</p>
              <div id="assessmentsList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/sb-admin-2.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    (async function() {
      var el = document.getElementById('assessmentsList');
      try {
        var list = await apiGet('assessments');
        if (list.length) {
          el.innerHTML = '<ul class="list-group list-group-flush">' + list.map(function(a) {
            return '<li class="list-group-item d-flex justify-content-between align-items-start"><div><span class="fw-bold">' + (a.title || '') + '</span><br><span class="small text-muted">Status: ' + (a.status || '') + '</span></div><span class="badge bg-primary">' + (a.status || '') + '</span></li>';
          }).join('') + '</ul>';
        } else {
          el.innerHTML = '<div class="alert alert-light border"><i class="fas fa-info-circle me-2"></i>No assessments yet. Create one via the API (<code>POST /api/v1/assessments</code>).</div>';
        }
      } catch (e) {
        el.innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle me-2"></i>Could not load assessments: ' + e.message + '.</div>';
      }
    })();
  </script>
</body>
</html>
