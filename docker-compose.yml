# Marlowe – backend, frontend, postgres, redis, qdrant, neo4j
# Ollama and MinIO run on host; backend uses host.docker.internal to reach them.
# Host ports 5010–5016 to avoid clash with Docling (5001) and other stacks.
# 5010=backend, 5011=frontend, 5012=postgres, 5013=redis, 5014=qdrant, 5015=neo4j http, 5016=neo4j bolt.
# Use: docker compose up -d

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://marlowe:marlowe@postgres:5432/marlowe
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MINIO_ENDPOINT=host.docker.internal:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=marlowe
      - SECRET_KEY=change-me-in-production
    env_file:
      - .env
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5011:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: marlowe
      POSTGRES_PASSWORD: marlowe
      POSTGRES_DB: marlowe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5012:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marlowe -d marlowe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "5013:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "5014:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "5015:7474"
      - "5016:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
