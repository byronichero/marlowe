<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        const stored = localStorage.getItem('marlowe-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const dark = stored === 'dark' || (stored !== 'light' && systemDark);
        document.documentElement.classList.add(dark ? 'dark' : 'light');
      })();
    </script>
    <link rel="icon" type="image/jpeg" href="/marlowe.jpeg" />
    <link rel="apple-touch-icon" href="/marlowe.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marlowe - AI Governance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
